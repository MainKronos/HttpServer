<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title></title>
    <style>
        html {
            color-scheme: dark;
            font-family: 'Roboto', sans-serif;
        }

        body {
            margin: 0;
            background-color: #121212;
            color: #bababa;
        }

        main {
            background-color: rgba(255, 255, 255, 0.1);
            margin: 100px auto 100px auto;
            max-width: 1280px;
            min-height: calc(100vh - 340px);
            width: 60%;
            border-radius: 5px;
            padding: 10px;
            font-size: larger;
        }

        header {
            background-color: rgba(255, 255, 255, 0.1);
            color: #9FA8DA;
            padding: 5px 50px;
            text-align: center;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, .14), 0 1px 5px 0 rgba(0, 0, 0, .12), 0 3px 1px -2px rgba(0, 0, 0, .2);
        }

        li {
            list-style: none;
            padding: 0;
            margin: 0;
            text-indent: -0.75rem;
        }

        li[data-type="directory"]::before {
            content: '📁 ';
        }

        li[data-type="file"]::before {
            content: '📄 ';
        }

    </style>
    <script>
        window.addEventListener('load', async function () {
            document.title = window.location.pathname;
            document.querySelector("h1").innerText = window.location.pathname;

            const res = await fetch(window.location.href, { method: "POST" });
            for (const file of await res.json()) {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.innerText = file.name;
                a.href = file.path;
                li.appendChild(a);
                li.setAttribute("data-type", file.type);
                document.querySelector("ul").appendChild(li);
            }
        });
    </script>
</head>

<body>
    <header>
        <h1></h1>
    </header>

    <main>
        <ul></ul>
    </main>
</body>

</html>
